<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="学府膳智 — 学生端，查看食谱、参与论坛、投票与互动。">
  <title>学生中心 — 学府膳智</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="student.css">
</head>

<body>

  <!-- ========== HEADER ========== -->
  <header class="stu-header">
    <div class="stu-header-inner">
      <a href="index.html" class="stu-brand">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <path d="M24 4C12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20S35.05 4 24 4zm0 36c-8.84 0-16-7.16-16-16S15.16 8 24 8s16 7.16 16 16-7.16 16-16 16z"/>
          <path d="M24 12c-1.1 0-2 .9-2 2v8c0 .74.4 1.38 1 1.73V34c0 .55.45 1 1 1s1-.45 1-1V23.73c.6-.35 1-.99 1-1.73v-8c0-1.1-.9-2-2-2z"/>
          <circle cx="18" cy="18" r="2"/><circle cx="30" cy="18" r="2"/>
          <path d="M15 24c0 1.66 1.34 3 3 3h12c1.66 0 3-1.34 3-3v-1H15v1z"/>
        </svg>
        学府膳智
      </a>

      <nav class="stu-nav" id="stu-nav">
        <button class="stu-nav-btn active" data-section="home">🏠 首页</button>
        <button class="stu-nav-btn" data-section="daily">📅 每日食谱</button>
        <button class="stu-nav-btn" data-section="total">📖 总食谱</button>
        <button class="stu-nav-btn" data-section="preference">🎯 个性化推荐</button>
        <button class="stu-nav-btn" data-section="forum">💬 论坛</button>
        <button class="stu-nav-btn" data-section="suggest">📝 建议栏</button>
        <button class="stu-nav-btn" data-section="vote">🗳️ 投票</button>
      </nav>

      <div class="stu-actions">
        <button type="button" class="theme-toggle" id="stu-theme-toggle" aria-label="切换明暗主题" style="width:3.6rem;height:3.6rem;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1.5px solid var(--border);">
          <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="12" cy="12" r="5" fill="currentColor"/></svg>
        </button>
        <button class="stu-user-btn" id="stu-user-btn">
          <span id="stu-user-name">学生</span> ▾
        </button>
      </div>
    </div>
  </header>

  <!-- ========== MAIN BODY ========== -->
  <div class="stu-body">

    <!-- ===== 首页 ===== -->
    <div class="dash-section active" id="section-home">
      <h1 class="dash-main-title" style="margin-bottom:2.4rem;">👋 欢迎回来，<span id="stu-welcome-name">同学</span></h1>

      <!-- ===== Barrage ===== -->
      <div class="barrage-stage" id="barrage-stage">
        <div class="barrage-track" id="barrage-track-1" aria-hidden="true"></div>
        <div class="barrage-track" id="barrage-track-2" aria-hidden="true"></div>
        <div class="barrage-track" id="barrage-track-3" aria-hidden="true"></div>
      </div>

      <div class="stu-home-grid">
        <div>
          <div class="dash-panel">
            <div class="dash-panel-title">
              <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              🔥 热门排行榜
            </div>
            <div id="stu-hot-ranking"></div>
          </div>
        </div>
        <div>
          <div class="dash-panel">
            <div class="dash-panel-title">
              <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              📢 最新通知
            </div>
            <div id="stu-notices"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 每日食谱 ===== -->
    <div class="dash-section" id="section-daily">
      <h1 class="dash-main-title" style="margin-bottom:2rem;">📅 每日食谱安排</h1>
      <div class="dash-tabs" id="daily-day-tabs"></div>
      <div id="daily-menu-content"></div>
    </div>

    <!-- ===== 总食谱 ===== -->
    <div class="dash-section" id="section-total">
      <h1 class="dash-main-title" style="margin-bottom:2rem;">📖 总食谱</h1>
      <div class="dash-tabs" id="total-meal-tabs-stu">
        <button class="dash-tab active" data-meal="breakfast">早餐</button>
        <button class="dash-tab" data-meal="lunch">午餐</button>
        <button class="dash-tab" data-meal="dinner">晚餐</button>
      </div>
      <div id="stu-total-menu"></div>
    </div>

    <!-- ===== 个性化推荐 ===== -->
    <div class="dash-section" id="section-preference">
      <h1 class="dash-main-title" style="margin-bottom:2rem;">🎯 个性化用餐推荐</h1>

      <!-- 喜好设置 -->
      <div class="dash-panel">
        <div class="dash-panel-title">
          <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          设置你的口味偏好
        </div>

        <div class="preference-grid">
          <div class="dash-form-group">
            <label>辣度偏好 <small style="font-weight:400;text-transform:none;">（单选）</small></label>
            <div class="preference-tags preference-group--single" id="spicy-level">
              <button class="preference-tag" data-value="不辣">不辣</button>
              <button class="preference-tag" data-value="微辣">微辣</button>
              <button class="preference-tag" data-value="中辣">中辣</button>
              <button class="preference-tag" data-value="特辣">特辣</button>
            </div>
          </div>

          <div class="dash-form-group">
            <label>口味偏好 <small style="font-weight:400;text-transform:none;">（多选）</small></label>
            <div class="preference-tags preference-group--multi" id="taste-preferences">
              <button class="preference-tag" data-value="清淡">清淡</button>
              <button class="preference-tag" data-value="重口味">重口味</button>
              <button class="preference-tag" data-value="甜味">甜味</button>
              <button class="preference-tag" data-value="咸味">咸味</button>
              <button class="preference-tag" data-value="酸味">酸味</button>
              <button class="preference-tag" data-value="鲜味">鲜味</button>
              <button class="preference-tag" data-value="麻味">麻味</button>
            </div>
          </div>

          <div class="dash-form-group">
            <label>饮食类型 <small style="font-weight:400;text-transform:none;">（多选）</small></label>
            <div class="preference-tags preference-group--multi" id="diet-type">
              <button class="preference-tag" data-value="荤素搭配">荤素搭配</button>
              <button class="preference-tag" data-value="偏素食">偏素食</button>
              <button class="preference-tag" data-value="全素食">全素食</button>
              <button class="preference-tag" data-value="高蛋白">高蛋白</button>
              <button class="preference-tag" data-value="低碳水">低碳水</button>
              <button class="preference-tag" data-value="低脂">低脂</button>
            </div>
          </div>

          <div class="dash-form-group">
            <label>过敏忌口 <small style="font-weight:400;text-transform:none;">（多选）</small></label>
            <div class="preference-tags preference-group--multi" id="allergies">
              <button class="preference-tag" data-value="海鲜">海鲜</button>
              <button class="preference-tag" data-value="花生">花生</button>
              <button class="preference-tag" data-value="牛奶">牛奶</button>
              <button class="preference-tag" data-value="鸡蛋">鸡蛋</button>
              <button class="preference-tag" data-value="大豆">大豆</button>
              <button class="preference-tag" data-value="小麦">小麦</button>
              <button class="preference-tag" data-value="坚果">坚果</button>
            </div>
          </div>

          <div class="dash-form-group">
            <label>菜系偏好 <small style="font-weight:400;text-transform:none;">（多选）</small></label>
            <div class="preference-tags preference-group--multi" id="cuisine-preferences">
              <button class="preference-tag" data-value="川菜">川菜</button>
              <button class="preference-tag" data-value="粤菜">粤菜</button>
              <button class="preference-tag" data-value="湘菜">湘菜</button>
              <button class="preference-tag" data-value="鲁菜">鲁菜</button>
              <button class="preference-tag" data-value="淮扬菜">淮扬菜</button>
              <button class="preference-tag" data-value="东北菜">东北菜</button>
              <button class="preference-tag" data-value="西北菜">西北菜</button>
              <button class="preference-tag" data-value="日韩料理">日韩料理</button>
            </div>
          </div>
        </div>

        <button class="dash-btn dash-btn--primary" id="btn-save-preferences" style="margin-top:1.6rem;">
          <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存偏好设置
        </button>
      </div>

      <!-- 推荐结果 -->
      <div class="dash-panel" id="recommendation-panel" style="display:none;">
        <div class="dash-panel-title">
          <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          为你推荐的用餐规划
        </div>
        <div id="recommendation-content"></div>
      </div>
    </div>

    <!-- ===== 论坛 ===== -->
    <div class="dash-section" id="section-forum">
      <div class="dash-main-header">
        <h1 class="dash-main-title">💬 校园论坛</h1>
        <button class="dash-btn dash-btn--primary" id="btn-new-post">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          发布帖子
        </button>
      </div>
      <div id="stu-forum-list"></div>
    </div>

    <!-- ===== 建议栏 ===== -->
    <div class="dash-section" id="section-suggest">
      <h1 class="dash-main-title" style="margin-bottom:2rem;">📝 我的建议</h1>
      <div class="dash-panel" style="margin-bottom:2rem;">
        <div class="dash-form-group">
          <label>提交新建议</label>
          <textarea class="dash-textarea" id="new-suggestion-text" placeholder="写下你对食堂的建议或意见..." style="min-height:8rem;"></textarea>
        </div>
        <button class="dash-btn dash-btn--primary" id="btn-submit-suggestion">提交建议</button>
      </div>
      <div id="stu-suggestions-list"></div>
    </div>

    <!-- ===== 投票 ===== -->
    <div class="dash-section" id="section-vote">
      <h1 class="dash-main-title" style="margin-bottom:2rem;">🗳️ 下周食谱由你做主</h1>
      <div id="stu-vote-content"></div>
    </div>

  </div>

  <!-- ========== MODALS ========== -->
  <!-- New Post Modal -->
  <div class="dash-modal-overlay" id="modal-new-post">
    <div class="dash-modal">
      <h3 class="dash-modal-title">发布新帖子</h3>
      <div class="dash-form-group">
        <label>标题</label>
        <input class="dash-input" id="post-title" placeholder="帖子标题">
      </div>
      <div class="dash-form-group">
        <label>内容</label>
        <textarea class="dash-textarea" id="post-content" placeholder="写下你想说的..."></textarea>
      </div>
      <div class="dash-modal-actions">
        <button class="dash-btn dash-btn--secondary" id="post-cancel">取消</button>
        <button class="dash-btn dash-btn--primary" id="post-submit">发布</button>
      </div>
    </div>
  </div>

  <!-- Forum Reply Modal -->
  <div class="dash-modal-overlay" id="modal-stu-reply">
    <div class="dash-modal">
      <h3 class="dash-modal-title">回复帖子</h3>
      <div class="dash-form-group">
        <label>回复内容</label>
        <textarea class="dash-textarea" id="stu-reply-text" placeholder="请输入你的回复..."></textarea>
      </div>
      <div class="dash-modal-actions">
        <button class="dash-btn dash-btn--secondary" id="stu-reply-cancel">取消</button>
        <button class="dash-btn dash-btn--primary" id="stu-reply-submit">提交回复</button>
      </div>
    </div>
  </div>

  <!-- Comment Modal -->
  <div class="dash-modal-overlay" id="modal-comment">
    <div class="dash-modal">
      <h3 class="dash-modal-title">发表评论</h3>
      <div class="dash-form-group">
        <label>评论内容</label>
        <textarea class="dash-textarea" id="comment-text" placeholder="说说你对这道菜的看法..." style="min-height:8rem;"></textarea>
      </div>
      <div class="dash-modal-actions">
        <button class="dash-btn dash-btn--secondary" id="comment-cancel">取消</button>
        <button class="dash-btn dash-btn--primary" id="comment-submit">提交</button>
      </div>
    </div>
  </div>

  <!-- Dish Suggestion Modal -->
  <div class="dash-modal-overlay" id="modal-dish-suggest">
    <div class="dash-modal">
      <h3 class="dash-modal-title">提出建议</h3>
      <div class="dash-form-group">
        <label>你的建议</label>
        <textarea class="dash-textarea" id="dish-suggest-text" placeholder="对这道菜有什么建议？" style="min-height:8rem;"></textarea>
      </div>
      <div class="dash-modal-actions">
        <button class="dash-btn dash-btn--secondary" id="dish-suggest-cancel">取消</button>
        <button class="dash-btn dash-btn--primary" id="dish-suggest-submit">提交</button>
      </div>
    </div>
  </div>

  <!-- User Dropdown -->
  <div class="stu-dropdown" id="stu-dropdown">
    <a href="index.html" class="stu-dropdown-item">🏠 返回首页</a>
    <button class="stu-dropdown-item" id="stu-logout">🚪 退出登录</button>
  </div>

  <script src="shared.js"></script>
  <script src="student.js"></script>

</body>
</html>
